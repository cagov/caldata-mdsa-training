site_name: CalData's Modern Data Stack Training
theme:
  name: material
  logo: images/odi-square_logomark-blue.svg
  favicon: images/odi-circle_logomark-blue.png
  features:
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript/quiz.js

repo_name: cagov/caldata-mdsa-training
repo_url: https://github.com/cagov/caldata-mdsa-training
edit_uri: ""

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      auto_title: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Learning path: learning-path.md
  - Concepts and tools: concepts-tools.md
  - Code development:
      - Git: code/git.md
      - Local dev setup: code/local-dev-setup.md
      - Code-hosting platforms:
          - GitHub: code/platforms/github.md
          - Azure DevOps: code/platforms/devops.md
  - Cloud data warehouses:
      - Snowflake: cloud-data-warehouses/snowflake.md
  - Data transformation:
      - dbt:
          - Part I - Foundations and staging models: data-transformation/dbt/pt-i.md
          - Part II - YAML documentation and testing: data-transformation/dbt/pt-ii.md
          - Part III - Materializations and intermediate models: data-transformation/dbt/pt-iii.md
          - Part IV - dbt docs and mart models: data-transformation/dbt/pt-iv.md
          - Part V - Environments, jobs, CI/CD, and custom schemas: data-transformation/dbt/pt-v.md
          - Answer key: data-transformation/dbt/answer-key.md
          - Advanced topics and practice:
              - Macros & custom tests: data-transformation/dbt/advanced/macros-custom-tests.md
